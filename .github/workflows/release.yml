name: release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG="${TAG_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG)"; exit 1;
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Package VSIX
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          npx @vscode/vsce package -o "bedrock-vscode-chat-with-inference-profile-support-${VERSION}.vsix"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: bedrock-vscode-chat-with-inference-profile-support-*.vsix

  publish:
    runs-on: ubuntu-latest
    needs: [package]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: .

      - name: Publish to VS Code Marketplace
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          npx @vscode/vsce publish --pat ${{ secrets.MARKETPLACE_TOKEN }} --packagePath "./bedrock-vscode-chat-with-inference-profile-support-${VERSION}.vsix"

  release:
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          VSIX="bedrock-vscode-chat-with-inference-profile-support-${VERSION}.vsix"
          gh release create "${TAG_NAME}" \
            "./${VSIX}" \
            --title "${TAG_NAME}" \
            --generate-notes
